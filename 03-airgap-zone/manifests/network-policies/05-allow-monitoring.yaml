# Allow Prometheus to scrape metrics from all pods
# This enables observability while maintaining security

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: lumen
  annotations:
    description: "Allow Prometheus (kube-prometheus-stack) to scrape metrics from lumen-api"
spec:
  podSelector:
    matchLabels:
      app: lumen-api
  policyTypes:
    - Ingress
  ingress:
    # Allow from monitoring namespace (kube-prometheus-stack)
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8080

