# Allow external access to lumen-api
# In production, this would be from an ingress controller or load balancer

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: lumen
  annotations:
    description: "Allow external traffic to lumen-api on port 8080"
spec:
  podSelector:
    matchLabels:
      app: lumen-api
  policyTypes:
    - Ingress
  ingress:
    # Allow from anywhere (in airgap, "anywhere" is just internal network)
    - from:
        - namespaceSelector: {}
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080

---
# Allow API to make egress to Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-egress-to-redis
  namespace: lumen
  annotations:
    description: "Allow lumen-api to connect to Redis"
spec:
  podSelector:
    matchLabels:
      app: lumen-api
  policyTypes:
    - Egress
  egress:
    # To Redis master/replica (port 6379) and sentinels (port 26379)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
