# NetworkPolicies for Vault Secrets Operator namespace

---
# Default deny all in vault-secrets-operator namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vault-secrets-operator
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# DNS egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: vault-secrets-operator
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# VSO controller: egress to Vault (read secrets)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vso-egress-to-vault
  namespace: vault-secrets-operator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault-secrets-operator
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: vault
      ports:
        - protocol: TCP
          port: 8200
    # Kubernetes API server (for TokenReview + Secret management)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443

---
# VSO webhook: ingress from API server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vso-webhook-ingress
  namespace: vault-secrets-operator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault-secrets-operator
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 9443  # VSO webhook port
