# NetworkPolicies for kube-prometheus-stack in monitoring namespace

---
# Allow DNS access for all pods in monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS to kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Prometheus Operator egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-operator-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus-operator
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # API server (for CRD management)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443

    # Prometheus instances
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9090

---
# Prometheus egress to scrape targets
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # API server
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443

    # Scrape all services in all namespaces
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080  # Lumen API, ArgoCD, kube-state-metrics
        - protocol: TCP
          port: 8083  # ArgoCD metrics
        - protocol: TCP
          port: 8084  # ArgoCD repo-server
        - protocol: TCP
          port: 9090  # Prometheus self-monitor
        - protocol: TCP
          port: 9093  # AlertManager
        - protocol: TCP
          port: 9100  # Node Exporter
        - protocol: TCP
          port: 9153  # CoreDNS metrics
        - protocol: TCP
          port: 3000  # Gitea
        - protocol: TCP
          port: 6379  # Redis (optional)

---
# kube-state-metrics egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kube-state-metrics-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # API server (to collect K8s object metrics)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443

---
