# NetworkPolicies for cert-manager namespace
#
# cert-manager requires:
#   Ingress: from API server (webhook calls on Certificate/Issuer resources)
#   Egress:  DNS, API server (CRD management), Vault (PKI issuance), traefik namespace (cert Secret)

---
# Default deny all in cert-manager namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# DNS egress for all cert-manager pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# cert-manager controller: egress to API server + Vault
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-manager-controller-egress
  namespace: cert-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
  policyTypes:
    - Egress
  egress:
    # Kubernetes API server (CRD management, Certificate/Issuer watch)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443

    # Vault PKI engine (issue certs via ClusterIssuer)
    - to:
        - namespaceSelector:
            matchLabels:
              name: vault
      ports:
        - protocol: TCP
          port: 8200

---
# cert-manager webhook: ingress from API server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-manager-webhook-ingress
  namespace: cert-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: webhook  # Helm chart label: app.kubernetes.io/name=webhook
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From API server (ValidatingWebhookConfiguration calls)
    # Port 10260: K3s-compatible webhook port (10250 clashes with kubelet)
    - ports:
        - protocol: TCP
          port: 10260
        - protocol: TCP
          port: 443
  egress:
    # API server
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443

---
# cainjector: egress to API server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-manager-cainjector-egress
  namespace: cert-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cainjector  # Helm chart label: app.kubernetes.io/name=cainjector
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
