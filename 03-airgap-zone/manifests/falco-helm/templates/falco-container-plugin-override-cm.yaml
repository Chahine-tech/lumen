# ConfigMap: overrides the builtin /etc/falco/config.d/falco.container_plugin.yaml
# The image ships: load_plugins: [container]
# We replace it with an empty file — the plugin is declared in falco.yaml instead,
# pointing to the K3s containerd socket at /host/run/k3s/containerd/containerd.sock
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-container-plugin-override
  namespace: falco
data:
  falco.container_plugin.yaml: |
    plugins:
      - name: container
        library_path: libcontainer.so
        init_config:
          with_size: false
          label_max_len: 100
          engines:
            containerd:
              enabled: true
              sockets:
                - /host/run/k3s/containerd/containerd.sock
            docker:
              enabled: false
              sockets:
                - /var/run/docker.sock
            cri:
              enabled: false
              sockets:
                - /run/crio/crio.sock
            podman:
              enabled: false
              sockets:
                - /run/podman/podman.sock
            lxc:
              enabled: false
            libvirt_lxc:
              enabled: false
            bpm:
              enabled: false
    load_plugins:
      - container
