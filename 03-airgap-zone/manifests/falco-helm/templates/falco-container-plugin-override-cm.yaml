# ConfigMap: overrides the builtin /etc/falco/config.d/falco.container_plugin.yaml
# K3s uses cgroup paths with "cri-containerd-HASH.scope" format.
# Only the "cri" engine can parse this format → use cri engine (not containerd engine).
# The "containerd" engine uses native containerd gRPC but cannot match K8s cgroup paths,
# causing container.id to always be empty (GitHub issue #3587).
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-container-plugin-override
  namespace: falco
data:
  falco.container_plugin.yaml: |
    plugins:
      - name: container
        library_path: libcontainer.so
        init_config:
          with_size: false
          label_max_len: 100
          engines:
            containerd:
              enabled: false
              sockets:
                - /var/run/containerd/containerd.sock
            docker:
              enabled: false
              sockets:
                - /var/run/docker.sock
            cri:
              enabled: true
              sockets:
                - /host/run/k3s/containerd/containerd.sock
            podman:
              enabled: false
              sockets:
                - /run/podman/podman.sock
            lxc:
              enabled: false
            libvirt_lxc:
              enabled: false
            bpm:
              enabled: false
    load_plugins:
      - container
