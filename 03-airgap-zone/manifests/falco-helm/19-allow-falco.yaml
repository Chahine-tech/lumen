# NetworkPolicies for Falco namespace
# Falco is a DaemonSet that monitors kernel syscalls via eBPF —
# it doesn't need much network access beyond DNS and the API server.

---
# Default deny all in falco namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: falco
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# DNS egress (required for all pods)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: falco
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Falco → Kubernetes API server
# Needed for: watching pods/events, TokenReview (if using K8s audit)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falco-egress-apiserver
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: falco
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443

---
# Falco DaemonSet → k8s-metacollector gRPC (port 45000)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falco-egress-metacollector
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: falco
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: k8s-metacollector
      ports:
        - protocol: TCP
          port: 45000

---
# k8s-metacollector → Kubernetes API server (watch pods/namespaces/etc)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: metacollector-egress-apiserver
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app: k8s-metacollector
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Falco → k8s-metacollector ingress (allow Falco pods to reach it)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: metacollector-ingress-falco
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app: k8s-metacollector
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: falco
      ports:
        - protocol: TCP
          port: 45000

---
# Prometheus scraping of Falco metrics (port 8765)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falco-metrics-ingress
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: falco
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8765
