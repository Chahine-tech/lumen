# Falco 0.43.0 — Airgap override values
# All images redirected to internal registry (192.168.2.2:5000)
# Driver: modern_ebpf — self-contained, no runtime downloads needed

falco:
  image:
    registry: 192.168.2.2:5000
    repository: falcosecurity/falco
    tag: "0.43.0"
    pullPolicy: IfNotPresent

  # modern_ebpf: self-contained eBPF probe, no kernel module download
  # Works on Ubuntu 24.04 ARM64 (kernel ≥5.8) — perfect for airgap
  driver:
    kind: modern_ebpf
    loader:
      initContainer:
        enabled: false  # No driver-loader needed with modern_ebpf

  # Collectors: K3s uses containerd at /run/k3s/containerd/containerd.sock
  collectors:
    enabled: true
    docker:
      enabled: false
    containerd:
      enabled: true
      socket: /run/k3s/containerd/containerd.sock
    crio:
      enabled: false

  # The image ships /etc/falco/config.d/falco.container_plugin.yaml which does:
  #   load_plugins: [container]
  # We override falco.yaml to declare the container plugin with the K3s socket.
  # The config.d file is overridden via extraVolumeMounts below to avoid duplication.
  falco:
    # Plugin config is in config.d/falco.container_plugin.yaml (overridden via ConfigMap)
    # No plugins/load_plugins here to avoid duplicate registration
    load_plugins: []
    json_output: true
    json_include_output_property: true
    log_level: info
    log_stderr: true
    log_syslog: false
    stdout_output:
      enabled: true

  # Override the builtin config.d/falco.container_plugin.yaml with an empty file
  # to avoid "found another plugin with name container" duplicate registration error.
  # Note: this chart uses mounts.volumes / mounts.volumeMounts (not extraVolumes)
  mounts:
    volumes:
      - name: container-plugin-override
        configMap:
          name: falco-container-plugin-override
    volumeMounts:
      - name: container-plugin-override
        mountPath: /etc/falco/config.d/falco.container_plugin.yaml
        subPath: falco.container_plugin.yaml
        readOnly: true

  # Falcosidekick disabled — using stdout → Alloy → Loki pipeline
  falcosidekick:
    enabled: false

  # DaemonSet tolerations — run on all nodes (control-plane + worker)
  tolerations:
    - operator: Exists

  # Resources tuned for 2-node cluster (node-1: 4CPU/6G, node-2: 2CPU/4G)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podSecurityContext: {}

  # Disable falco-talon (automated remediation engine — not needed)
  falcotalon:
    enabled: false

  # Disable telemetry (airgap — no outbound connections)
  falcoctl:
    artifact:
      install:
        enabled: false
      follow:
        enabled: false

  # Metrics endpoint for Prometheus scraping
  metrics:
    enabled: true
    listen: "0.0.0.0"
    port: 8765
    interval: 15s
    output_rule: true
