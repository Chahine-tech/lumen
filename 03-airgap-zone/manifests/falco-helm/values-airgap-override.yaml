# Falco 0.43.0 — Airgap override values
# All images redirected to internal registry (192.168.2.2:5000)
# Driver: modern_ebpf — self-contained, no runtime downloads needed
# Plugins: container (cri engine) + k8smeta → full container + K8s metadata

falco:
  image:
    registry: 192.168.2.2:5000
    repository: falcosecurity/falco
    tag: "0.43.0"
    pullPolicy: IfNotPresent

  # modern_ebpf: self-contained eBPF probe, no kernel module download
  # Works on Ubuntu 24.04 ARM64 (kernel ≥5.8) — perfect for airgap
  driver:
    kind: modern_ebpf
    loader:
      initContainer:
        enabled: false  # No driver-loader needed with modern_ebpf

  # Collectors: use containerd socket pointing to K3s socket path.
  # The chart automatically:
  #   1. Mounts /run/k3s/containerd/containerd.sock → /host/run/k3s/containerd/containerd.sock
  #   2. Sets container_engines.cri.enabled=true with the correct socket in falco.yaml
  # This enables container.id, container.image.* enrichment via the built-in container plugin.
  collectors:
    enabled: true
    docker:
      enabled: false
    containerd:
      enabled: true
      socket: /run/k3s/containerd/containerd.sock
    crio:
      enabled: false

  # Plugin config:
  #   - container plugin: registered here, socket configured via container_engines (above)
  #   - k8smeta plugin: config.d/k8smeta.yaml adds it to load_plugins
  falco:
    plugins:
      - name: container
        library_path: libcontainer.so
        init_config: {}
    load_plugins:
      - container
    json_output: true
    json_include_output_property: true
    log_level: info
    log_stderr: true
    log_syslog: false
    stdout_output:
      enabled: true

  # Init container: copy libk8smeta.so from plugin image into shared emptyDir
  # The Falco container then loads it from /plugins/libk8smeta.so
  # Note: sub-chart key = falco.extra.initContainers
  extra:
    initContainers:
      - name: k8smeta-plugin-install
        image: 192.168.2.2:5000/falcosecurity/k8smeta-plugin:0.4.1
        imagePullPolicy: IfNotPresent
        command: ["cp", "/plugins/libk8smeta.so", "/falco-plugins/libk8smeta.so"]
        volumeMounts:
          - name: falco-plugins
            mountPath: /falco-plugins

  # Volumes + mounts for k8smeta plugin ConfigMap and libk8smeta.so
  # Note: container plugin socket mount is handled by collectors.containerd above
  mounts:
    volumes:
      - name: k8smeta-plugin-config
        configMap:
          name: falco-k8smeta-plugin
      - name: falco-plugins
        emptyDir: {}
    volumeMounts:
      # Add k8smeta plugin config into config.d/
      - name: k8smeta-plugin-config
        mountPath: /etc/falco/config.d/k8smeta.yaml
        subPath: k8smeta.yaml
        readOnly: true
      # libk8smeta.so copied by init container
      - name: falco-plugins
        mountPath: /plugins

  # Falcosidekick disabled — using stdout → Alloy → Loki pipeline
  falcosidekick:
    enabled: false

  # DaemonSet tolerations — run on all nodes (control-plane + worker)
  tolerations:
    - operator: Exists

  # Resources tuned for 2-node cluster (node-1: 4CPU/6G, node-2: 2CPU/4G)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podSecurityContext: {}

  # Disable falco-talon (automated remediation engine — not needed)
  falcotalon:
    enabled: false

  # Disable telemetry (airgap — no outbound connections)
  falcoctl:
    artifact:
      install:
        enabled: false
      follow:
        enabled: false

  # Metrics endpoint for Prometheus scraping
  metrics:
    enabled: true
    listen: "0.0.0.0"
    port: 8765
    interval: 15s
    output_rule: true
