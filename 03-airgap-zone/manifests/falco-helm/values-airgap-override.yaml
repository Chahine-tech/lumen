# Falco 0.43.0 — Airgap override values
# All images redirected to internal registry (192.168.2.2:5000)
# Driver: modern_ebpf — self-contained, no runtime downloads needed
# Plugins: container (cri engine) + k8smeta → full container + K8s metadata

falco:
  image:
    registry: 192.168.2.2:5000
    repository: falcosecurity/falco
    tag: "0.43.0"
    pullPolicy: IfNotPresent

  # modern_ebpf: self-contained eBPF probe, no kernel module download
  # Works on Ubuntu 24.04 ARM64 (kernel ≥5.8) — perfect for airgap
  driver:
    kind: modern_ebpf
    loader:
      initContainer:
        enabled: false  # No driver-loader needed with modern_ebpf

  # Collectors: disabled — container metadata comes from the container plugin (cri engine)
  # The "collectors" feature is the old pre-plugin metadata system; we use the new plugin.
  collectors:
    enabled: false

  # Plugin config loaded via config.d/ (overridden ConfigMaps):
  #   - falco.container_plugin.yaml → container plugin (cri engine, K3s socket)
  #   - k8smeta.yaml               → k8smeta plugin (gRPC → k8s-metacollector)
  # No load_plugins here — each config.d file declares its own load_plugins.
  falco:
    load_plugins: []
    json_output: true
    json_include_output_property: true
    log_level: info
    log_stderr: true
    log_syslog: false
    stdout_output:
      enabled: true

  # Init container: copy libk8smeta.so from plugin image into shared emptyDir
  # The Falco container then loads it from /plugins/libk8smeta.so
  # Note: sub-chart key = falco.extra.initContainers
  extra:
    initContainers:
      - name: k8smeta-plugin-install
        image: 192.168.2.2:5000/falcosecurity/k8smeta-plugin:0.2.1
        imagePullPolicy: IfNotPresent
        command: ["cp", "/plugins/libk8smeta.so", "/falco-plugins/libk8smeta.so"]
        volumeMounts:
          - name: falco-plugins
            mountPath: /falco-plugins

  # Volumes + mounts for plugin override ConfigMaps and libk8smeta.so
  mounts:
    volumes:
      - name: container-plugin-override
        configMap:
          name: falco-container-plugin-override
      - name: k8smeta-plugin-config
        configMap:
          name: falco-k8smeta-plugin
      - name: falco-plugins
        emptyDir: {}
    volumeMounts:
      # Override builtin container plugin config → use cri engine (not containerd)
      - name: container-plugin-override
        mountPath: /etc/falco/config.d/falco.container_plugin.yaml
        subPath: falco.container_plugin.yaml
        readOnly: true
      # Add k8smeta plugin config into config.d/
      - name: k8smeta-plugin-config
        mountPath: /etc/falco/config.d/k8smeta.yaml
        subPath: k8smeta.yaml
        readOnly: true
      # libk8smeta.so copied by init container
      - name: falco-plugins
        mountPath: /plugins

  # Falcosidekick disabled — using stdout → Alloy → Loki pipeline
  falcosidekick:
    enabled: false

  # DaemonSet tolerations — run on all nodes (control-plane + worker)
  tolerations:
    - operator: Exists

  # Resources tuned for 2-node cluster (node-1: 4CPU/6G, node-2: 2CPU/4G)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podSecurityContext: {}

  # Disable falco-talon (automated remediation engine — not needed)
  falcotalon:
    enabled: false

  # Disable telemetry (airgap — no outbound connections)
  falcoctl:
    artifact:
      install:
        enabled: false
      follow:
        enabled: false

  # Metrics endpoint for Prometheus scraping
  metrics:
    enabled: true
    listen: "0.0.0.0"
    port: 8765
    interval: 15s
    output_rule: true
