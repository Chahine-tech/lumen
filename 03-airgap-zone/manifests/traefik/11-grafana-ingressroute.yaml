# Grafana IngressRoute
# Educational: Routes https://grafana.airgap.local → grafana.monitoring:3000

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-http
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.airgap.local`)
      kind: Rule
      services:
        - name: grafana
          port: 3000
      middlewares:
        - name: https-redirect
          namespace: traefik

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-https
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.airgap.local`)
      kind: Rule
      services:
        - name: grafana
          port: 3000
      middlewares:
        - name: security-headers
          namespace: traefik
        - name: compression
          namespace: traefik
  tls:
    secretName: airgap-tls
