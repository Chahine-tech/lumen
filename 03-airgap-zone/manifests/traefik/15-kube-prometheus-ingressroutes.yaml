# Traefik IngressRoutes for kube-prometheus-stack services
# These replace the old monitoring IngressRoutes

---
# Prometheus HTTP → HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-http
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`prometheus.airgap.local`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
      middlewares:
        - name: https-redirect
          namespace: traefik

---
# Prometheus HTTPS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-https
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prometheus.airgap.local`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
      middlewares:
        - name: security-headers
          namespace: traefik
        - name: compression
          namespace: traefik
        - name: rate-limit
          namespace: traefik
  tls:
    secretName: airgap-tls

