# Vault UI IngressRoute
# Routes https://vault.airgap.local → vault-ui.vault.svc.cluster.local:8200

---
# HTTP → HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vault-http
  namespace: vault
  annotations:
    description: "Redirect HTTP to HTTPS for Vault UI"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`vault.airgap.local`)
      kind: Rule
      services:
        - name: vault-ui
          port: 8200
      middlewares:
        - name: https-redirect
          namespace: traefik

---
# HTTPS with TLS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vault-https
  namespace: vault
  annotations:
    description: "Vault UI — Secure HTTPS access"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vault.airgap.local`)
      kind: Rule
      services:
        - name: vault-ui
          port: 8200
      middlewares:
        - name: security-headers
          namespace: traefik
        - name: compression
          namespace: traefik
  tls:
    secretName: airgap-tls
    # Note: airgap-tls Secret must exist in vault namespace
    # Run: kubectl get secret airgap-tls -n traefik -o yaml | \
    #        sed 's/namespace: traefik/namespace: vault/' | kubectl apply -f -
    # Or add vault to copy-tls-secrets.sh
