# Lumen API IngressRoute
# Educational: Routes https://lumen-api.airgap.local → lumen-api.lumen.svc.cluster.local:8080
# This is cross-namespace routing (traefik → lumen namespace)

---
# HTTP → HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lumen-api-http
  namespace: lumen
  annotations:
    description: "Redirect HTTP to HTTPS for Lumen API"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`lumen-api.airgap.local`)
      kind: Rule
      services:
        - name: lumen-api
          port: 8080
      middlewares:
        - name: https-redirect
          namespace: traefik  # Reference middleware from traefik namespace

---
# HTTPS with TLS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lumen-api-https
  namespace: lumen
  annotations:
    description: "Lumen API - Secure HTTPS access"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`lumen-api.airgap.local`)
      kind: Rule
      services:
        - name: lumen-api
          port: 8080
      middlewares:
        - name: rate-limit
          namespace: traefik
        - name: security-headers
          namespace: traefik
        - name: compression
          namespace: traefik
  tls:
    secretName: airgap-tls
    # Note: Secret must be in same namespace as IngressRoute
    # We'll copy the secret to lumen namespace
