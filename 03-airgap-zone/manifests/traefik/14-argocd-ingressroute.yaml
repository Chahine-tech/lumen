# ArgoCD IngressRoute
# Educational: ArgoCD requires special handling - it needs original request headers

---
# Special middleware for ArgoCD
# ArgoCD needs original Host header preserved
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-headers
  namespace: argocd
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-Host: "argocd.airgap.local"
      X-Forwarded-Port: "443"

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-http
  namespace: argocd
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.airgap.local`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80
      middlewares:
        - name: https-redirect
          namespace: traefik

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-https
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.airgap.local`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80  # ArgoCD listens on 80, handles TLS internally
      middlewares:
        - name: argocd-headers
        - name: security-headers
          namespace: traefik
  tls:
    secretName: airgap-tls
