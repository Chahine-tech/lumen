# VaultStaticSecret — syncs lumen/redis from Vault KV v2 into a K8s Secret
# Consumed by the Redis StatefulSets (requirepass/masterauth/auth-pass) and
# by lumen-api (REDIS_PASSWORD). Seeded by the vault-init Job.
# The lumen-api-policy already grants read on lumen/data/redis.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: lumen-redis-credentials
  namespace: lumen
spec:
  vaultAuthRef: lumen-vault-auth
  type: kv-v2
  mount: lumen
  path: redis
  destination:
    name: lumen-redis-vault
    create: true
  refreshAfter: 1h
