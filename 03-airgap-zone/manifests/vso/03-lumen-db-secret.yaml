# VaultStaticSecret — syncs lumen/db from Vault KV v2 into a K8s Secret
# VSO watches this and keeps the Secret up to date automatically
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: lumen-db-credentials
  namespace: lumen
spec:
  vaultAuthRef: lumen-vault-auth
  type: kv-v2
  mount: lumen
  path: db
  destination:
    name: lumen-db-vault   # Secret K8s créé/géré par VSO
    create: true
  refreshAfter: 1h
