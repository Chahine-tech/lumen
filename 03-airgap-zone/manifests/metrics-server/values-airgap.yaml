# Metrics Server v0.8.0 - Airgap Override Values
# Required for HPA (Horizontal Pod Autoscaler)

image:
  repository: 192.168.2.2:5000/metrics-server/metrics-server
  tag: "v0.8.0"
  pullPolicy: IfNotPresent

# Required for K3s - clear defaultArgs and set custom args
defaultArgs: []
args:
  - --cert-dir=/tmp
  - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
  - --kubelet-use-node-status-port
  - --metric-resolution=15s
  - --kubelet-insecure-tls

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
