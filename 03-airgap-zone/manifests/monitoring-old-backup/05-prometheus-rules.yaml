apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: lumen-api-alerts
        interval: 30s
        rules:
          # Pod Down
          - alert: LumenAPIPodDown
            expr: up{job="lumen-api"} == 0
            for: 1m
            labels:
              severity: critical
              component: lumen-api
            annotations:
              summary: "Lumen API pod is down"
              description: "Lumen API pod {{ $labels.instance }} has been down for more than 1 minute."

          # High Memory Usage
          - alert: LumenAPIHighMemory
            expr: |
              (container_memory_usage_bytes{pod=~"lumen-api.*"} /
               container_spec_memory_limit_bytes{pod=~"lumen-api.*"}) > 0.85
            for: 5m
            labels:
              severity: warning
              component: lumen-api
            annotations:
              summary: "Lumen API high memory usage"
              description: "Lumen API pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of its memory limit."

          # High CPU Usage
          - alert: LumenAPIHighCPU
            expr: |
              rate(container_cpu_usage_seconds_total{pod=~"lumen-api.*"}[5m]) > 0.8
            for: 5m
            labels:
              severity: warning
              component: lumen-api
            annotations:
              summary: "Lumen API high CPU usage"
              description: "Lumen API pod {{ $labels.pod }} CPU usage is {{ $value | humanize }} cores."

          # High Error Rate
          - alert: LumenAPIHighErrorRate
            expr: |
              rate(lumen_http_requests_total{status=~"5.."}[5m]) /
              rate(lumen_http_requests_total[5m]) > 0.05
            for: 5m
            labels:
              severity: critical
              component: lumen-api
            annotations:
              summary: "Lumen API high error rate"
              description: "Lumen API error rate is {{ $value | humanizePercentage }} (threshold: 5%)."

      - name: redis-alerts
        interval: 30s
        rules:
          # Redis Down
          - alert: RedisDown
            expr: up{job="kubernetes-pods",app="redis"} == 0
            for: 1m
            labels:
              severity: critical
              component: redis
            annotations:
              summary: "Redis pod is down"
              description: "Redis pod {{ $labels.instance }} has been down for more than 1 minute."

          # Redis High Memory
          - alert: RedisHighMemory
            expr: |
              (container_memory_usage_bytes{pod=~"redis.*"} /
               container_spec_memory_limit_bytes{pod=~"redis.*"}) > 0.85
            for: 5m
            labels:
              severity: warning
              component: redis
            annotations:
              summary: "Redis high memory usage"
              description: "Redis pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of its memory limit."

      - name: cluster-alerts
        interval: 30s
        rules:
          # Node Down
          - alert: NodeDown
            expr: up{job="kubernetes-nodes"} == 0
            for: 3m
            labels:
              severity: critical
              component: cluster
            annotations:
              summary: "Kubernetes node is down"
              description: "Node {{ $labels.instance }} has been down for more than 3 minutes."

          # High Node Memory
          - alert: NodeHighMemory
            expr: |
              (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
            for: 5m
            labels:
              severity: warning
              component: cluster
            annotations:
              summary: "Node high memory usage"
              description: "Node {{ $labels.instance }} memory usage is {{ $value | humanizePercentage }}."

          # High Node CPU
          - alert: NodeHighCPU
            expr: |
              100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 5m
            labels:
              severity: warning
              component: cluster
            annotations:
              summary: "Node high CPU usage"
              description: "Node {{ $labels.instance }} CPU usage is {{ $value | humanize }}%."

      - name: prometheus-alerts
        interval: 30s
        rules:
          # Prometheus Config Reload Failed
          - alert: PrometheusConfigReloadFailed
            expr: prometheus_config_last_reload_successful == 0
            for: 5m
            labels:
              severity: critical
              component: prometheus
            annotations:
              summary: "Prometheus config reload failed"
              description: "Prometheus {{ $labels.instance }} config reload has failed."

          # Prometheus Target Down
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 5m
            labels:
              severity: warning
              component: prometheus
            annotations:
              summary: "Prometheus target down"
              description: "Prometheus target {{ $labels.job }}/{{ $labels.instance }} is down."
