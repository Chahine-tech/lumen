apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: lumen
spec:
  metrics:
    - name: success-rate
      # Evaluate every 1 minute, for 5 checks total (~5 min)
      interval: 1m
      count: 5
      # Must stay >= 95% success rate (default(1.0) guards against empty result / no traffic yet)
      successCondition: "default(result, 1.0) >= 0.95"
      # 3 consecutive failures → rollback
      failureLimit: 3
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{app="lumen-api",status!~"5.."}[2m]))
            /
            sum(rate(http_requests_total{app="lumen-api"}[2m]))
