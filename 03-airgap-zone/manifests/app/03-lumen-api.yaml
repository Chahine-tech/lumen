apiVersion: v1
kind: ConfigMap
metadata:
  name: lumen-api-config
  namespace: lumen
data:
  REDIS_ADDR: "redis:6379"
  REDIS_MODE: "sentinel"
  REDIS_SENTINEL_ADDRS: "redis-sentinel.lumen.svc.cluster.local:26379"
  REDIS_MASTER_NAME: "mymaster"
  PORT: "8080"
  # PostgreSQL - read/write splitting via CNPG services
  # Credentials from Secret lumen-db-vault (managed by VSO from Vault KV lumen/db)
  PG_RW_HOST: "lumen-db-rw.lumen.svc.cluster.local"
  PG_RO_HOST: "lumen-db-ro.lumen.svc.cluster.local"

---
apiVersion: v1
kind: Service
metadata:
  name: lumen-api
  namespace: lumen
  labels:
    app: lumen-api
    tier: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: lumen-api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lumen-api-pdb
  namespace: lumen
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: lumen-api

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumen-api
  namespace: lumen
  labels:
    app: lumen-api
    tier: backend
    version: v1.5.1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lumen-api
  template:
    metadata:
      labels:
        app: lumen-api
        tier: backend
        version: v1.5.1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: lumen-api
          image: 192.168.2.2:5000/lumen-api:v1.5.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: lumen-api-config
                  key: REDIS_ADDR
            - name: REDIS_MODE
              valueFrom:
                configMapKeyRef:
                  name: lumen-api-config
                  key: REDIS_MODE
            - name: REDIS_SENTINEL_ADDRS
              valueFrom:
                configMapKeyRef:
                  name: lumen-api-config
                  key: REDIS_SENTINEL_ADDRS
            - name: REDIS_MASTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: lumen-api-config
                  key: REDIS_MASTER_NAME
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: lumen-api-config
                  key: PORT
            - name: TEMPO_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4318"
            # PostgreSQL DSNs (read/write splitting)
            # lumen-db-vault Secret is managed by Vault Secrets Operator (VSO)
            # Source of truth: Vault KV v2 at lumen/db
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lumen-db-vault
                  key: password
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: lumen-db-vault
                  key: username
            - name: PG_DBNAME
              valueFrom:
                secretKeyRef:
                  name: lumen-db-vault
                  key: dbname
            - name: PG_RW_DSN
              value: "postgresql://$(PG_USER):$(PG_PASSWORD)@lumen-db-rw.lumen.svc.cluster.local:5432/$(PG_DBNAME)"
            - name: PG_RO_DSN
              value: "postgresql://$(PG_USER):$(PG_PASSWORD)@lumen-db-ro.lumen.svc.cluster.local:5432/$(PG_DBNAME)"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
