apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-master-config
  namespace: lumen
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    protected-mode no
    daemonize no
    loglevel notice
    logfile ""
    databases 16
    save 900 1
    save 300 10
    save 60 10000
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb
    dir /data
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    replica-lazy-flush yes

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-replica-config
  namespace: lumen
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    protected-mode no
    daemonize no
    loglevel notice
    logfile ""
    databases 16
    dir /data
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    replicaof redis-master-0.redis-master.lumen.svc.cluster.local 6379

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-sentinel-config
  namespace: lumen
data:
  sentinel.conf: |
    port 26379
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
    sentinel monitor mymaster redis-master-0.redis-master.lumen.svc.cluster.local 6379 2
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 60000
    sentinel parallel-syncs mymaster 1

---
# Headless service for redis-master StatefulSet DNS
# Enables: redis-master-0.redis-master.lumen.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: lumen
  labels:
    app: redis
    role: master
spec:
  clusterIP: None
  selector:
    app: redis
    role: master
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP

---
# ClusterIP service — preserves redis:6379 DNS for lumen-api standalone fallback
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lumen
  labels:
    app: redis
    tier: cache
spec:
  type: ClusterIP
  selector:
    app: redis
    role: master
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP

---
# Headless service for redis-replica StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  namespace: lumen
  labels:
    app: redis
    role: replica
spec:
  clusterIP: None
  selector:
    app: redis
    role: replica
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP

---
# ClusterIP service for sentinel — lumen-api connects here
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: lumen
  labels:
    app: redis
    role: sentinel
spec:
  type: ClusterIP
  selector:
    app: redis
    role: sentinel
  ports:
    - name: sentinel
      port: 26379
      targetPort: 26379
      protocol: TCP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-master
  namespace: lumen
  labels:
    app: redis
    role: master
    tier: cache
spec:
  serviceName: redis-master
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: master
  template:
    metadata:
      labels:
        app: redis
        role: master
        tier: cache
    spec:
      nodeSelector:
        kubernetes.io/hostname: node-1
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: 192.168.2.2:5000/redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["redis-server", "/config/redis.conf"]
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: redis-master-config
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-replica
  namespace: lumen
  labels:
    app: redis
    role: replica
    tier: cache
spec:
  serviceName: redis-replica
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: replica
  template:
    metadata:
      labels:
        app: redis
        role: replica
        tier: cache
    spec:
      nodeSelector:
        kubernetes.io/hostname: node-2
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: 192.168.2.2:5000/redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["redis-server", "/config/redis.conf"]
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: config
              mountPath: /config
      volumes:
        - name: redis-data
          emptyDir: {}
        - name: config
          configMap:
            name: redis-replica-config

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-sentinel
  namespace: lumen
  labels:
    app: redis
    role: sentinel
    tier: cache
spec:
  serviceName: redis-sentinel
  replicas: 3
  selector:
    matchLabels:
      app: redis
      role: sentinel
  template:
    metadata:
      labels:
        app: redis
        role: sentinel
        tier: cache
    spec:
      # No nodeSelector — K8s distributes across node-1 and node-2
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      initContainers:
        - name: init-sentinel-config
          image: 192.168.2.2:5000/redis:7-alpine
          command:
            - sh
            - -c
            - cp /config-readonly/sentinel.conf /config/sentinel.conf
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config-readonly
              mountPath: /config-readonly
            - name: config-writable
              mountPath: /config
      containers:
        - name: sentinel
          image: 192.168.2.2:5000/redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["redis-sentinel", "/config/sentinel.conf"]
          ports:
            - name: sentinel
              containerPort: 26379
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            tcpSocket:
              port: 26379
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -p 26379 sentinel masters | grep -q mymaster
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config-writable
              mountPath: /config
      volumes:
        - name: config-readonly
          configMap:
            name: redis-sentinel-config
        - name: config-writable
          emptyDir: {}
