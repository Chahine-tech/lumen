apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: traefik
  namespace: traefik
  labels:
    release: kube-prometheus-stack  # Critical: tells Prometheus Operator to discover this ServiceMonitor
    app: traefik
    environment: airgap
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  endpoints:
    - port: traefik  # Port 8080 (metrics endpoint)
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - traefik
