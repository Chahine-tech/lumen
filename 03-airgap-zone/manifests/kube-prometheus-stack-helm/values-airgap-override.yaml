# Airgap overrides for kube-prometheus-stack
# This file overrides default values to use 192.168.2.2:5000 registry

# Global settings
global:
  imageRegistry: 192.168.2.2:5000

# Alertmanager
alertmanager:
  alertmanagerSpec:
    image:
      registry: 192.168.2.2:5000
      repository: prometheus/alertmanager
      tag: v0.31.1  # Updated to latest

# Grafana
grafana:
  image:
    registry: 192.168.2.2:5000
    repository: grafana/grafana
    tag: "12.4.0-22046043985"  # Updated to latest (Feb 2026)
  adminPassword: admin

  # Sidecar for auto-reload of dashboards
  sidecar:
    image:
      registry: 192.168.2.2:5000
      repository: kiwigrid/k8s-sidecar
      tag: "1.30.1"  # Updated to latest
    dashboards:
      enabled: true
    datasources:
      enabled: true

# kube-state-metrics
kubeStateMetrics:
  image:
    registry: 192.168.2.2:5000
    repository: kube-state-metrics/kube-state-metrics
    tag: v2.14.0  # Updated to latest

# Node Exporter
nodeExporter:
  image:
    registry: 192.168.2.2:5000
    repository: prometheus/node-exporter
    tag: v1.8.2  # Updated to latest

# Prometheus
prometheus:
  prometheusSpec:
    image:
      registry: 192.168.2.2:5000
      repository: prometheus/prometheus
      tag: v3.5.1  # Updated to latest LTS (Prometheus 3.x)

    # Match ALL ServiceMonitors
    serviceMonitorSelector: {}
    podMonitorSelector: {}

# Prometheus Operator
prometheusOperator:
  image:
    registry: 192.168.2.2:5000
    repository: prometheus-operator/prometheus-operator
    tag: v0.78.2  # Updated to latest (supports Prometheus 3.x)

  prometheusConfigReloader:
    image:
      registry: 192.168.2.2:5000
      repository: prometheus-operator/prometheus-config-reloader
      tag: v0.78.2  # Updated to match operator version

  admissionWebhooks:
    enabled: false  # Disable webhooks for simplicity in airgap
    patch:
      enabled: false  # Also disable the webhook patch job
