apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lumen-network-policies
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Chahine-tech/lumen.git
    targetRevision: HEAD
    path: 03-airgap-zone/manifests/network-policies

  destination:
    server: https://kubernetes.default.svc
    # No namespace specified - uses namespace from each manifest file
    # NetworkPolicies are deployed in: lumen, kube-system, argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
