apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lumen-monitoring
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Chahine-tech/lumen.git
    targetRevision: HEAD
    path: 03-airgap-zone/manifests/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: lumen

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
