apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  timeout.reconciliation: "180s"

  statusbadge.enabled: "false"

  exec.enabled: "false"

  admin.enabled: "true"

  application.instanceLabelKey: app.kubernetes.io/instance
