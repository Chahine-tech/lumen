---
# Lumen airgap cluster inventory
# Prerequisite: SSH key must be injected into VMs before using this inventory.
# See 04-ansible/README.md for one-time setup instructions.

all:
  children:
    control_plane:
      hosts:
        node-1:
          ansible_host: 192.168.2.2
    workers:
      hosts:
        node-2:
          ansible_host: 192.168.2.3
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

# localhost runs kubectl/vault/helm commands using the local kubeconfig
local:
  hosts:
    localhost:
      ansible_connection: local
