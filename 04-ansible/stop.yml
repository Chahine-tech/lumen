---
# stop.yml — Gracefully stop the lumen airgap cluster
#
# Usage:
#   ansible-playbook 04-ansible/stop.yml
#
# What it does:
#   1. Drain node-2 (evict workloads cleanly)
#   2. Stop both Multipass VMs

- name: Drain and stop the cluster
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Check cluster is reachable
      ansible.builtin.command: kubectl get nodes --no-headers
      register: nodes_check
      changed_when: false
      failed_when: false

    - name: Show current node status
      ansible.builtin.debug:
        msg: "{{ nodes_check.stdout_lines }}"

    - name: Drain node-2 (evict workloads)
      ansible.builtin.command: >
        kubectl drain node-2
        --ignore-daemonsets
        --delete-emptydir-data
        --grace-period=30
        --timeout=120s
      when: nodes_check.rc == 0
      register: drain_result
      changed_when: true
      failed_when: drain_result.rc != 0

    - name: Stop Multipass VMs
      ansible.builtin.command: multipass stop node-2 node-1
      register: stop_result
      changed_when: true

    - name: Confirm VMs stopped
      ansible.builtin.command: multipass list
      register: vm_list
      changed_when: false

    - name: Show VM status
      ansible.builtin.debug:
        msg: "{{ vm_list.stdout_lines }}"

    - name: Done
      ansible.builtin.debug:
        msg: |
          Cluster stopped cleanly.
          To restart: ansible-playbook 04-ansible/start.yml
