---
# Lumen airgap cluster — global variables
# All versions, IPs, credentials, and paths in one place

# ──────────────────────────────────────────────────────────────────────────────
# Cluster topology
# ──────────────────────────────────────────────────────────────────────────────
node1_ip: "192.168.2.2"
node2_ip: "192.168.2.3"
node1_name: "node-1"
node2_name: "node-2"

# ──────────────────────────────────────────────────────────────────────────────
# K3s
# ──────────────────────────────────────────────────────────────────────────────
k3s_version: "v1.28.5+k3s1"

# ──────────────────────────────────────────────────────────────────────────────
# Registry
# ──────────────────────────────────────────────────────────────────────────────
registry_host: "192.168.2.2"
registry_port: 5000
registry_url: "192.168.2.2:5000"

# ──────────────────────────────────────────────────────────────────────────────
# MetalLB
# ──────────────────────────────────────────────────────────────────────────────
metallb_vip: "192.168.2.100"
metallb_version: "0.15.3"

# ──────────────────────────────────────────────────────────────────────────────
# Vault
# ──────────────────────────────────────────────────────────────────────────────
vault_namespace: "vault"
vault_pods:
  - vault-0
  - vault-1
  - vault-2

# Path to vault-keys.json (relative to playbook_dir)
vault_keys_file: "{{ playbook_dir }}/../vault-keys.json"

# ──────────────────────────────────────────────────────────────────────────────
# Gitea
# ──────────────────────────────────────────────────────────────────────────────
gitea_admin_user: "gitea-admin"
gitea_admin_password: "gitea-admin"
gitea_org: "lumen"
gitea_repo: "lumen"
gitea_local_port: 3001  # port-forward local port

# ──────────────────────────────────────────────────────────────────────────────
# ArgoCD Applications (sync-wave order)
# ──────────────────────────────────────────────────────────────────────────────
argocd_namespace: "argocd"
argocd_apps:
  - "04-application-lumen.yaml"
  - "05-application-monitoring-config.yaml"
  - "06-application-network-policies.yaml"
  - "07-application-traefik.yaml"
  - "08-application-kube-prometheus.yaml"
  - "09-application-loki.yaml"
  - "10-application-alloy.yaml"
  - "12-application-tempo.yaml"
  - "13-application-vault.yaml"
  - "14-application-cert-manager.yaml"
  - "15-application-vso.yaml"
  - "16-application-falco.yaml"
  - "17-application-argo-rollouts.yaml"

# ──────────────────────────────────────────────────────────────────────────────
# OPA Gatekeeper manifests (applied in order)
# ──────────────────────────────────────────────────────────────────────────────
opa_manifests:
  - "01-gatekeeper-install.yaml"
  - "02-constraint-template-registry.yaml"
  - "03-constraint-template-labels.yaml"
  - "04-constraint-template-resources.yaml"
  - "05-constraint-template-no-latest.yaml"

# ──────────────────────────────────────────────────────────────────────────────
# DNS — airgap domains (all resolve to MetalLB VIP)
# ──────────────────────────────────────────────────────────────────────────────
airgap_domains:
  - "lumen-api.airgap.local"
  - "vault.airgap.local"
  - "argocd.airgap.local"
  - "gitea.airgap.local"
  - "grafana.airgap.local"
  - "prometheus.airgap.local"
  - "alertmanager.airgap.local"
  - "traefik.airgap.local"
  - "tempo.airgap.local"

# ──────────────────────────────────────────────────────────────────────────────
# Paths (relative to playbook_dir = 04-ansible/)
# ──────────────────────────────────────────────────────────────────────────────
project_root: "{{ playbook_dir }}/.."
manifests_dir: "{{ project_root }}/03-airgap-zone/manifests"
opa_manifests_dir: "{{ manifests_dir }}/opa"
argocd_apps_dir: "{{ manifests_dir }}/argocd"
ca_cert_path: "{{ project_root }}/03-airgap-zone/airgap-ca.crt"

# Multipass VM specs
node1_cpus: 4
node1_memory: "6G"
node1_disk: "40G"
node2_cpus: 2
node2_memory: "4G"
node2_disk: "30G"
