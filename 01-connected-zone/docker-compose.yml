version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: lumen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - lumen-net

  postgres:
    image: postgres:16-alpine
    container_name: lumen-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - lumen-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumen-api
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - PORT=8080
      - PG_RW_DSN=postgresql://app:password@postgres:5432/app
      - PG_RO_DSN=postgresql://app:password@postgres:5432/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - lumen-net

volumes:
  redis-data:
  postgres-data:

networks:
  lumen-net:
    driver: bridge
