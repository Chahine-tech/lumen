version: '3.8'

# Transit Zone: Registry pour stocker les images avant transfert en airgap
# Simule un "sneakernet" ou une zone DMZ

services:
  # Simple Docker Registry (alternative légère à Harbor)
  registry:
    image: registry:2
    container_name: transit-registry
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
      - ./config/registry-config.yml:/etc/docker/registry/config.yml
    networks:
      - transit-net
    restart: unless-stopped

  # Registry UI pour visualiser les images
  registry-ui:
    image: joxit/docker-registry-ui:latest
    container_name: transit-registry-ui
    ports:
      - "8081:80"
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_TITLE=Airgap Transit Registry
      - REGISTRY_URL=http://registry:5000
      - DELETE_IMAGES=true
      - SHOW_CONTENT_DIGEST=true
    depends_on:
      - registry
    networks:
      - transit-net
    restart: unless-stopped

  # Nginx pour servir les fichiers (Helm charts, binaries, etc.)
  fileserver:
    image: nginx:alpine
    container_name: transit-fileserver
    ports:
      - "8082:80"
    volumes:
      - ../artifacts:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - transit-net
    restart: unless-stopped

networks:
  transit-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  registry-data:
